plugins {
    id 'java'
    id 'application'
}

group = 'mysya.cat'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    implementation 'com.opencsv:opencsv:5.12.0' // Подключена библиотека opencsv для чтения csv
    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter:6.0.3'
}

java { // настройка Java
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

application { // указывает, какой класс содержит метод main
    mainClass = 'Main'
}

test {
    useJUnitPlatform()
}